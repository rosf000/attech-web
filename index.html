<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">智能選型系統 | Solution Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50/60 text-slate-800 font-sans min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

    <div class="max-w-7xl mx-auto px-4 py-10 sm:py-14">
        <header class="mb-10 text-center relative flex flex-col items-center lg:block">
            <div class="relative mb-4 inline-flex p-0.5 bg-slate-200/70 rounded-lg backdrop-blur-sm order-first lg:order-none lg:absolute lg:top-0 lg:right-0 lg:mb-0">
                <button onclick="switchLanguage('zh')" id="lang-zh-btn" class="px-3 py-1 text-xs font-semibold rounded-md shadow-sm bg-white text-slate-800 transition-all duration-200">中文</button>
                <button onclick="switchLanguage('en')" id="lang-en-btn" class="px-3 py-1 text-xs font-medium rounded-md text-slate-600 hover:text-slate-900 transition-all duration-200">EN</button>
            </div>
            <h1 id="ui-title" class="text-3xl font-extrabold text-slate-900 tracking-tight sm:text-4xl mb-3 w-full">智能選型系統</h1>
        </header>

        <section class="bg-indigo-900 text-white rounded-2xl p-6 mb-8 shadow-md">
            <h2 id="ui-product-line-title" class="text-sm font-bold mb-4 flex items-center tracking-wide text-indigo-200">
                <i class="fa-solid fa-layer-group mr-2"></i> 請選擇產業應用
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="product-line-tabs-container"></div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-6 mb-8">
            <h2 id="ui-step1" class="text-base font-bold mb-5 flex items-center text-indigo-600 tracking-wide">
                <span class="flex items-center justify-center w-6 h-6 rounded-full bg-indigo-50 text-indigo-600 text-xs font-black mr-2.5">1</span>
                定義您的核心應用訴求
            </h2>
            <div class="grid grid-cols-[repeat(auto-fit,minmax(100px,1fr))] gap-2.5" id="category-roadmap"></div>
        </section>

        <div class="w-full">
            <div class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-6">
                <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-3 mb-6 pb-4 border-b border-slate-100">
                    <h3 class="text-base font-bold text-slate-900">
                        <span id="ui-match-title">符合篩選條件的產品</span> (<span id="match-count" class="text-indigo-600 font-extrabold">0</span>)
                    </h3>
                    <div class="text-xs text-slate-500 flex items-center gap-2">
                        <span id="active-filter-badge" class="hidden text-[11px] bg-amber-50 text-amber-700 border border-amber-200/60 px-2 py-0.5 rounded font-medium"><i class="fa-solid fa-filter mr-1"></i><span id="ui-filter-active-text">已啟用指標篩選</span></span>
                        <span id="ui-current-cat-prefix" class="text-slate-400">當前分類：</span><span id="current-cat-label" class="font-semibold text-slate-700 bg-slate-100 px-2 py-0.5 rounded">全部產品</span>
                    </div>
                </div>
                <div id="products-container" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-40">
        <button onclick="toggleFilterModal(true)" class="bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 px-5 rounded-full shadow-lg flex items-center gap-2 transition-all duration-200 transform hover:scale-[1.03] group">
            <div class="relative flex items-center justify-center">
                <i class="fa-solid fa-sliders text-sm group-hover:rotate-90 transition-transform duration-300"></i>
                <span id="badge-count" class="absolute -top-4 -right-4 bg-indigo-600 text-white text-[10px] font-black rounded-full h-4 w-4 flex items-center justify-center shadow-sm">0</span>
            </div>
            <span id="ui-adv-filter-btn" class="text-xs tracking-wide">進階指標篩選</span>
        </button>
    </div>

    <div id="filter-modal" class="fixed inset-0 z-50 overflow-hidden hidden transition-all duration-300">
        <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-xs transition-opacity opacity-0 duration-300" id="modal-overlay" onclick="toggleFilterModal(false)"></div>
        <div class="absolute inset-y-0 right-0 max-w-full flex pl-10 transform translate-x-full transition-transform duration-300" id="modal-panel">
            <div class="w-screen max-w-sm bg-white shadow-2xl flex flex-col border-l border-slate-100">
                <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-white">
                    <h2 class="text-sm font-bold flex items-center text-slate-900">
                        <i class="fa-solid fa-sliders text-indigo-500 mr-2"></i> <span id="ui-modal-title">進階指標篩選</span>
                    </h2>
                    <div class="flex items-center gap-3">
                        <button onclick="resetFilters()" id="ui-modal-reset" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">重設全部</button>
                        <button onclick="toggleFilterModal(false)" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-50 transition-colors"><i class="fa-solid fa-xmark text-base"></i></button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto px-5 py-4 custom-scrollbar space-y-5" id="filter-scroll-container">
                    <div class="space-y-5" id="performance-filters"></div>
                </div>
                <div class="border-t border-slate-100 px-4 py-3.5 bg-white flex gap-3">
                    <button onclick="toggleFilterModal(false)" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm text-center text-xs tracking-wide transition-colors">
                        <span id="ui-modal-submit-prefix">查看結果</span> (<span id="modal-match-count">0</span> <span id="ui-modal-submit-suffix">個產品</span>)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="tds-modal" class="fixed inset-0 z-50 overflow-hidden hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md opacity-0 transition-opacity duration-300" onclick="toggleTdsModal(false)"></div>
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl h-[85vh] flex flex-col relative z-10 border border-slate-100 transform scale-95 transition-transform duration-300">
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-white rounded-t-2xl">
                <h3 class="text-sm font-bold flex items-center text-slate-900">
                    <i id="modal-title-icon" class="fa-solid fa-file-pdf text-rose-500 mr-2 text-base"></i>
                    <span id="tds-modal-title">官方技術文件 (TDS)</span>
                </h3>
                <button onclick="toggleTdsModal(false)" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-xmark text-base"></i>
                </button>
            </div>
            <div class="flex-1 bg-slate-100 p-2 rounded-b-2xl">
                <iframe id="tds-iframe" class="w-full h-full rounded-xl border border-slate-200 bg-white" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <script>
        let DATA_CONFIGS = {};

        const iconMap = {
            "all": "fa-layer-group", "PTFE Altinative": "fa-flask-vial", "耐刮": "fa-wand-magic-sparkles",
            "耐磨": "fa-shield-halved", "高光澤": "fa-eye", "消光": "fa-border-none",
            "防腐蝕": "fa-shield-virus", "織紋": "fa-rug", "柔感": "fa-feather"
        };

        const featureConfig = {
            "zh": { ptfe_alternative: "PTFE 替代性", scratch_resistance: "耐刮", abrasion_resistance: "耐磨", anti_gassing: "抗氣泡/脫氣性", block_resistance: "抗沾黏性", matting_gloss_control: "消光", slip_lubricity: "滑爽/潤滑度", texture_structure: "織紋", corrosion_resistance: "防腐蝕" },
            "en": { ptfe_alternative: "PTFE Alternative", scratch_resistance: "Scratch Resistance", abrasion_resistance: "Abrasion Resistance", anti_gassing: "Anti-gassing", block_resistance: "Block Resistance", matting_gloss_control: "Matting/Gloss Control", slip_lubricity: "Slip/Lubricity", texture_structure: "Texture/Structure", corrosion_resistance: "Corrosion Resistance" }
        };

        const uiText = {
            "zh": {
                web_title: "智能選型系統", product_line_title: "請選擇產業應用", step1: "定義您的核心應用訴求", cat_all: "全系列產品",
                "industrial_title": "工業塗料", "powder_title": "粉體塗料",
                "PTFE Altinative": "PTFE 替代", "耐刮": "耐刮", "耐磨": "耐磨", "高光澤": "高光澤", "消光": "消光", "防腐蝕": "防腐蝕", "織紋": "織紋", "柔感": "柔感",
                match_title: "符合篩選條件的產品", filter_active: "已啟用指標篩選", current_cat_prefix: "當前分類：", loading: "正在載入產品資料庫...", adv_filter_btn: "進階指標篩選", modal_title: "進階指標篩選", modal_reset: "重設全部", modal_submit_prefix: "查看結果", modal_submit_suffix: "個產品", no_limit: "不限", score_suffix: "分", best_label: "極佳", no_product: "沒有找到符合當前篩選條件的產品", no_product_sub: "請嘗試放寬或重設進階性能指標。", system_type_title: "推薦系統", app_fields_title: "適用環境與場景", melt_point: "熔點", density: "密度", mean_size: "平均粒徑 D50", max_size: "最大粒徑 D100", official_doc: "官方文件", suggested_use_level_title: "建議添加量", tech_data: "技術資料", example: "案例"
            },
            "en": {
                web_title: "Solution Finder System", product_line_title: "Select Industry Use Case", step1: "Define Your Core Application Requirement", cat_all: "All Products",
                "industrial_title": "Industrial Coatings", "powder_title": "Powder Coatings",
                "PTFE Altinative": "PTFE Alternative", "耐刮": "Scratch Resistance", "耐磨": "Abrasion Resistance", "高光澤": "Clear/Gloss", "消光": "Matting", "防腐蝕": "Corrosion Resistance", "織紋": "Texture", "柔感": "Soft Touch",
                match_title: "Matching Products", filter_active: "Metric Filters Active", current_cat_prefix: "Category: ", loading: "Loading product database...", adv_filter_btn: "Advanced Metrics", modal_title: "Advanced Filters", modal_reset: "Reset All", modal_submit_prefix: "View Results", modal_submit_suffix: "Products", no_limit: "Any", score_suffix: " pts", best_label: "Excellent", no_product: "No matching products found", no_product_sub: "Please try to loosen or reset the advanced metric sliders.", system_type_title: "Recommended System Type", app_fields_title: "Application Fields", melt_point: "Melt Point", density: "Density", mean_size: "Mean Size D50", max_size: "Max Size D100", official_doc: "TDS", suggested_use_level_title: "Suggested Use Level", tech_data: "Technical Data", example: "Example"
            }
        };

        let currentProductLine = 'industrial';
        let allProducts = [];
        let currentCategory = 'all';
        let activeFilters = {};
        let currentLang = 'zh';

        document.addEventListener("DOMContentLoaded", () => {
            fetch('config.json')
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(configData => {
                    DATA_CONFIGS = configData;
                    initFilters();
                    loadDatabase();
                })
                .catch(() => {
                    document.getElementById('products-container').innerHTML = `<p class="text-center text-rose-500 py-10 text-xs">載入設定檔 config.json 失敗，請確認檔案是否存在。</p>`;
                });
        });

        function loadDatabase() {
            const container = document.getElementById('products-container');
            container.innerHTML = `<div class="text-center py-16 text-slate-400 col-span-full"><i class="fa-solid fa-spinner fa-spin text-xl mb-3 text-indigo-500"></i><p class="text-xs">${uiText[currentLang].loading}</p></div>`;

            const config = DATA_CONFIGS[currentProductLine];
            if(!config) return;

            renderProductLineTabs();
            renderCategoryButtons(config);
            updateStaticUI(config);

            fetch(config.jsonPath)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => { allProducts = data; renderProducts(); })
                .catch(() => { container.innerHTML = `<p class="text-center text-rose-500 py-10 text-xs col-span-full">載入 JSON 失敗，請確認檔案名稱與路徑是否正確。</p>`; });
        }

        function renderProductLineTabs() {
            const container = document.getElementById('product-line-tabs-container');
            const t = uiText[currentLang];
            const lines = [
                { key: 'industrial', icon: 'fa-industry', iconColor: 'text-indigo-300', title: t.industrial_title },
                { key: 'powder', icon: 'fa-cubes', iconColor: 'text-indigo-400', title: t.powder_title }
            ];

            container.innerHTML = lines.map(line => {
                const isActive = currentProductLine === line.key;
                const btnClass = isActive
                    ? "p-4 rounded-xl border-2 border-indigo-400 bg-indigo-800 text-white shadow-md flex items-center justify-between transition-all duration-200 font-bold w-full text-left"
                    : "p-4 rounded-xl border border-indigo-700 bg-indigo-950/40 text-indigo-200 hover:bg-indigo-800/50 flex items-center justify-between transition-all duration-200 w-full text-left";
                const rightIcon = isActive ? "fa-solid fa-circle-check text-indigo-300" : "fa-solid fa-chevron-right text-indigo-700 text-xs";

                return `
                    <button onclick="switchProductLine('${line.key}')" class="${btnClass}">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${line.icon} text-xl ${line.iconColor}"></i>
                            <div><span class="block text-sm tracking-wide">${line.title}</span></div>
                        </div>
                        <i class="${rightIcon}"></i>
                    </button>
                `;
            }).join('');
        }

        function switchProductLine(key) {
            if (currentProductLine === key) return;
            currentProductLine = key;
            activeFilters = {};
            currentCategory = 'all';
            initFilters();
            loadDatabase();
        }

        function renderCategoryButtons(config) {
            const roadmap = document.getElementById('category-roadmap');
            roadmap.innerHTML = `
                <button onclick="selectCategory('all')" id="btn-all" class="cat-btn p-3 rounded-xl border border-indigo-600 bg-indigo-50/40 text-indigo-700 shadow-sm flex flex-col items-center justify-center min-h-[96px] transition-all duration-200 font-semibold">
                    <span class="flex items-center justify-center h-6 mb-1.5 text-indigo-600"><i class="fa-solid fa-layer-group text-lg"></i></span>
                    <span class="text-xs tracking-wide block line-clamp-2">${uiText[currentLang].cat_all}</span>
                </button>
            `;
            Object.keys(config.categoryMap).forEach(cat => {
                const icon = iconMap[cat] || "fa-flask";
                const translatedCat = uiText[currentLang][cat] || cat;
                roadmap.innerHTML += `
                    <button onclick="selectCategory('${cat}')" id="btn-${cat}" class="cat-btn p-3 rounded-xl border border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50 hover:text-slate-900 flex flex-col items-center justify-center min-h-[96px] transition-all duration-200">
                        <span class="flex items-center justify-center h-6 mb-1.5 text-slate-400"><i class="fa-solid ${icon} text-lg"></i></span>
                        <span class="text-xs font-medium tracking-wide block line-clamp-2 leading-tight">${translatedCat}</span>
                    </button>
                `;
            });
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-zh-btn').className = lang === 'zh' ? "px-3 py-1 text-xs font-bold rounded-md shadow-sm bg-white text-slate-800 transition-all duration-200" : "px-3 py-1 text-xs font-medium rounded-md text-slate-600 hover:text-slate-900 transition-all duration-200";
            document.getElementById('lang-en-btn').className = lang === 'en' ? "px-3 py-1 text-xs font-bold rounded-md shadow-sm bg-white text-slate-800 transition-all duration-200" : "px-3 py-1 text-xs font-medium rounded-md text-slate-600 hover:text-slate-900 transition-all duration-200";

            const currentFilterValues = { ...activeFilters };
            initFilters();
            activeFilters = currentFilterValues;
            Object.entries(activeFilters).forEach(([key, val]) => { updateFilterSliderDOM(key, val); });
            loadDatabase();
        }

        function updateStaticUI(config) {
            const t = uiText[currentLang];
            document.getElementById('web-title').innerText = t.web_title;
            document.getElementById('ui-title').innerText = currentLang === 'zh' ? config.titleZh : config.titleEn;
            document.getElementById('ui-product-line-title').innerHTML = `<i class="fa-solid fa-layer-group mr-2"></i> ${t.product_line_title}`;
            document.getElementById('ui-step1').innerHTML = `<span class="flex items-center justify-center w-6 h-6 rounded-full bg-indigo-50 text-indigo-600 text-xs font-black mr-2.5">1</span>${t.step1}`;
            document.getElementById('ui-match-title').innerText = t.match_title;
            document.getElementById('ui-filter-active-text').innerText = t.filter_active;
            document.getElementById('ui-current-cat-prefix').innerText = t.current_cat_prefix;
            document.getElementById('ui-adv-filter-btn').innerText = t.adv_filter_btn;
            document.getElementById('ui-modal-title').innerText = t.modal_title;
            document.getElementById('ui-modal-reset').innerText = t.modal_reset;
            document.getElementById('ui-modal-submit-prefix').innerText = t.modal_submit_prefix;
            document.getElementById('ui-modal-submit-suffix').innerText = t.modal_submit_suffix;
            document.getElementById('current-cat-label').innerText = currentCategory === 'all' ? t.cat_all : (t[currentCategory] || currentCategory);
        }

        function initFilters() {
            const filterContainer = document.getElementById('performance-filters');
            filterContainer.innerHTML = '';
            const config = DATA_CONFIGS[currentProductLine];
            if (!config) return;

            Object.entries(featureConfig[currentLang]).forEach(([key, label]) => {
                if (!config.ratingKeyMap || !config.ratingKeyMap[key]) return;
                activeFilters[key] = activeFilters[key] || 0;
                const filterItem = document.createElement('div');
                filterItem.className = 'border-b border-slate-100 pb-4';
                filterItem.innerHTML = `
                       <div class="flex justify-between items-center mb-2">
                           <label class="text-xs font-semibold text-slate-700">${label}</label>
                           <span id="val-${key}" class="text-[10px] font-bold bg-slate-100 px-1.5 py-0.5 rounded text-slate-500">${uiText[currentLang].no_limit}</span>
                       </div>
                       <input type="range" min="0" max="3" value="${activeFilters[key]}" step="1" id="slider-${key}" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="updateFilterValue('${key}', this.value)">
                       <div class="flex justify-between text-[9px] text-slate-400 px-0.5 mt-1"><span>${uiText[currentLang].no_limit}</span><span>1</span><span>2</span><span>3</span></div>`;
                filterContainer.appendChild(filterItem);
            });
        }

        function updateFilterValue(key, val) {
            activeFilters[key] = parseInt(val);
            updateFilterSliderDOM(key, val);
            renderProducts();
        }

        function updateFilterSliderDOM(key, val) {
            const badge = document.getElementById(`val-${key}`);
            const slider = document.getElementById(`slider-${key}`);
            if (slider) slider.value = val;
            if (!badge) return;
            if (val == 0) {
                badge.innerText = uiText[currentLang].no_limit;
                badge.className = 'text-[10px] font-bold bg-slate-100 px-1.5 py-0.5 rounded text-slate-500';
            } else {
                badge.innerText = `≥ ${val}${uiText[currentLang].score_suffix}`;
                badge.className = 'text-[10px] font-bold bg-indigo-50 px-1.5 py-0.5 rounded text-indigo-600 border border-indigo-100';
            }
        }

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = 'cat-btn p-3 rounded-xl border border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50 hover:text-slate-900 flex flex-col items-center justify-center min-h-[96px] transition-all duration-200';
            });
            const activeBtn = document.getElementById(`btn-${cat}`);
            if (activeBtn) activeBtn.className = 'cat-btn p-3 rounded-xl border border-indigo-600 bg-indigo-50/40 text-indigo-700 shadow-sm flex flex-col items-center justify-center min-h-[96px] transition-all duration-200 font-semibold';
            document.getElementById('current-cat-label').innerText = cat === 'all' ? uiText[currentLang].cat_all : (uiText[currentLang][cat] || cat);
            renderProducts();
        }

        function toggleFilterModal(open) {
            const modal = document.getElementById('filter-modal');
            const overlay = document.getElementById('modal-overlay');
            const panel = document.getElementById('modal-panel');
            if (open) {
                modal.classList.remove('hidden');
                setTimeout(() => { overlay.classList.replace('opacity-0', 'opacity-100'); panel.classList.replace('translate-x-full', 'translate-x-0'); }, 10);
            } else {
                overlay.classList.replace('opacity-100', 'opacity-0'); panel.classList.replace('translate-x-0', 'translate-x-full');
                setTimeout(() => { modal.classList.add('hidden'); }, 300);
            }
        }

        function resetFilters() { activeFilters = {}; initFilters(); selectCategory('all'); }

        function renderProducts() {
            const container = document.getElementById('products-container');
            const t = uiText[currentLang];
            const config = DATA_CONFIGS[currentProductLine];
            if(!config) return;

            const filtered = allProducts.filter(p => {
                if (currentCategory !== 'all') {
                    const allowed = config.categoryMap[currentCategory] || [];
                    if (!allowed.includes(p.product_name)) return false;
                }
                for (const [key, minScore] of Object.entries(activeFilters)) {
                    if (minScore > 0) {
                        const jsonKey = config.ratingKeyMap[key] || key;
                        const score = p.performance_ratings ? (p.performance_ratings[jsonKey] || 0) : 0;
                        if (score < minScore) return false;
                    }
                }
                return true;
            });

            document.getElementById('match-count').innerText = filtered.length;
            document.getElementById('badge-count').innerText = filtered.length;
            document.getElementById('modal-match-count').innerText = filtered.length;

            const hasActiveFilter = Object.values(activeFilters).some(s => s > 0);
            document.getElementById('active-filter-badge').classList.toggle('hidden', !hasActiveFilter);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-16 border border-dashed rounded-2xl text-slate-400 text-xs col-span-full"><p class="font-bold">${t.no_product}</p><p class="mt-1 text-slate-400">${t.no_product_sub}</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(p => {
                const badges = Object.entries(featureConfig[currentLang])
                    .map(([key, label]) => {
                        const jsonKey = config.ratingKeyMap[key] || key;
                        const score = p.performance_ratings ? (p.performance_ratings[jsonKey] || 0) : 0;
                        if (score === 0) return '';
                        const colors = ['', 'bg-slate-50 text-slate-600 border border-slate-200', 'bg-indigo-50 text-indigo-700 border border-indigo-100', 'bg-emerald-50 text-emerald-700 font-bold border border-emerald-100'];
                        return `<span class="text-[10px] px-2 py-0.5 rounded-md ${colors[score]}">${label} [${score}]</span>`;
                    }).join('');

                const systemType = p['recommended_system_type_' + currentLang] || p.recommended_system_type || '—';
                const appFields = p['application_fields_' + currentLang] || p.application_fields || '—';

                return `
                    <div class="border border-slate-200/60 hover:border-indigo-200 hover:shadow-md rounded-2xl p-5 bg-white transition-all duration-300 flex flex-col justify-between">
                        <div>
                            <div class="mb-4">
                                <div class="flex items-center justify-between gap-2 flex-wrap mb-2">
                                    <h4 class="text-base font-bold text-slate-900">${p.product_name}</h4>
                                    <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded border">${p['composition_' + currentLang] || p.composition_zh}</span>
                                </div>
                                <div class="flex flex-wrap gap-1">
                                    ${p.website && p.website !== 'N/A' ? `
                                        <button type="button" onclick="openModel('${p.product_name}', 'tds')" class="px-2 py-0.5 text-[10px] text-indigo-600 bg-indigo-50 border border-indigo-100 rounded hover:bg-indigo-100 text-left">
                                            <i class="fa-solid fa-file-lines mr-1"></i>${t.official_doc}
                                        </button>
                                    ` : ''}
                                    ${p.tech_data_url && p.tech_data_url !== 'N/A' ? `
                                        <button type="button" onclick="openModel('${p.product_name}', 'data')" class="px-2 py-0.5 text-[10px] text-indigo-600 bg-indigo-50 border border-indigo-100 rounded hover:bg-indigo-100 text-left">
                                            <i class="fa-solid fa-file-lines mr-1"></i>${t.tech_data}
                                        </button>
                                    ` : ''}
                                </div>
                            </div>

                            <div class="bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-xl mb-4">
                                <span class="text-[10px] text-slate-400 block">${t.suggested_use_level_title}</span>
                                <span class="text-xs font-bold text-slate-700">${p['suggested_use_level_' + currentLang] || p.suggested_use_level}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-2 p-3 bg-slate-50/50 rounded-xl text-xs mb-4 border border-slate-100/50 text-slate-600">
                                <div><span class="text-slate-400 text-[10px] block">${t.melt_point} (°C)</span><strong>${p.typical_properties?.melt_point_c || '—'}</strong></div>
                                <div><span class="text-slate-400 text-[10px] block">${t.density} (g/cc)</span><strong>${p.typical_properties?.density_g_cc_25c || '—'}</strong></div>
                                <div><span class="text-slate-400 text-[10px] block">${t.mean_size} (µm)</span><strong>${p.typical_properties?.mean_particle_size_um || '—'}</strong></div>
                                <div><span class="text-slate-400 text-[10px] block">${t.max_size} (µm)</span><strong>${p.typical_properties?.max_particle_size_um || '—'}</strong></div>
                            </div>

                            <div class="space-y-3 text-xs mb-4">
                                <div class="bg-slate-50/30 p-2.5 rounded-xl border border-slate-100">
                                    <p class="font-bold text-slate-700 mb-0.5 flex items-center gap-1"><i class="fa-solid fa-circle-check text-emerald-600 text-[10px]"></i> ${t.system_type_title}</p>
                                    <p class="text-slate-500 text-[11px] leading-normal">${systemType === 'N/A' ? '—' : systemType}</p>
                                </div>
                                <div class="bg-slate-50/30 p-2.5 rounded-xl border border-slate-100">
                                    <p class="font-bold text-slate-700 mb-0.5 flex items-center gap-1"><i class="fa-solid fa-wand-magic-sparkles text-indigo-500 text-[10px]"></i> ${t.app_fields_title}</p>
                                    <p class="text-slate-500 text-[11px] leading-normal line-clamp-4 hover:line-clamp-none transition-all">${appFields === 'N/A' ? '—' : appFields}</p>
                                </div>
                            </div>

                            ${p.examples && p.examples !== 'N/A' && !p.examples.startsWith('http') ? `
                                <div class="block w-full text-left bg-amber-50 border border-amber-100 rounded-xl p-2.5 shadow-xs mb-4">
                                    <div class="text-[10px] font-bold text-amber-800 mb-1 flex items-center gap-1.5 border-b border-amber-200/40 pb-1">
                                        <i class="fa-solid fa-circle-info text-[9px]"></i>${t.example}
                                    </div>
                                    <ul class="space-y-1 list-none pl-0 m-0">
                                        ${p.examples.split(',').map(ex => `
                                            <li class="text-[10px] text-amber-700 flex items-start leading-relaxed">
                                                <span class="inline-block w-1.5 h-1.5 rounded-full bg-amber-400 mt-1.5 mr-2 shrink-0"></span>
                                                <span class="break-words">${ex.trim()}</span>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                            ` : p.examples && p.examples.startsWith('http') ? `
                                <div class="mb-4">
                                    <a href="${p.examples}" target="_blank" class="inline-block px-2 py-0.5 text-[10px] text-indigo-600 bg-indigo-50 border border-indigo-100 rounded hover:bg-indigo-100">
                                        <i class="fa-solid fa-file-lines mr-1"></i>${t.example}
                                    </a>
                                </div>
                            ` : ''}
                        </div>

                        <div class="flex flex-wrap gap-1.5 pt-3 border-t border-slate-100">${badges || '<span class="text-[11px] text-slate-400 italic">No traits</span>'}</div>
                    </div>`;
            }).join('');
        }

        function openModel(productName, type) {
            const modal = document.getElementById('tds-modal');
            const iframe = document.getElementById('tds-iframe');
            const title = document.getElementById('tds-modal-title');
            const icon = document.getElementById('modal-title-icon');
            let localPath = "";

            if (type === 'tds') {
                localPath = `./tds/${productName} TDS.pdf`;
                title.innerText = `${productName} - ${uiText[currentLang].official_doc}`;
                icon.className = "fa-solid fa-file-pdf text-rose-500 mr-2 text-base";
            } else if (type === 'data') {
                localPath = `./coatingsdata/${productName} data.pdf`;
                title.innerText = `${productName} - ${uiText[currentLang].tech_data}`;
                icon.className = "fa-solid fa-file-lines text-indigo-500 mr-2 text-base";
            }
            iframe.src = localPath + "#toolbar=0&navpanes=0";
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.querySelector('.bg-slate-900\\/40').classList.replace('opacity-0', 'opacity-100');
                modal.querySelector('.max-w-4xl').classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function toggleTdsModal(open) {
            const modal = document.getElementById('tds-modal');
            const iframe = document.getElementById('tds-iframe');
            if (!open) {
                const overlay = modal.querySelector('.bg-slate-900\\/40');
                const panel = modal.querySelector('.max-w-4xl');
                overlay.classList.replace('opacity-100', 'opacity-0');
                panel.classList.replace('scale-100', 'scale-95');
                setTimeout(() => {
                    modal.classList.replace('flex', 'hidden');
                    iframe.src = "";
                }, 300);
            }
        }
    </script>
</body>
</html>
